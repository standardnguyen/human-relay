services:
  human-relay:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "8090:8090"
    env_file:
      - .env
    volumes:
      - /root/.ssh/id_ed25519:/root/.ssh/id_ed25519:ro
      - /root/.ssh/id_ed25519.pub:/root/.ssh/id_ed25519.pub:ro
      - relay-ssh:/root/.ssh-data
      - relay-data:/opt/human-relay/data
      # Mount target must match MHR_SSH_CONFIG if set, or /root/.ssh/config if unset
      - ./ssh_config:/root/.ssh/config:ro
      - ./scripts:/scripts

  # Signal bridge for the relay's messaging surface. Compose-internal only —
  # no published ports; the API is unauthenticated, so the relay's approval
  # flow (http_request / run_script) is the sole path to it.
  # :latest is deliberate: Signal server compat requires a current client.
  signal-api:
    image: bbernhard/signal-cli-rest-api:latest
    restart: unless-stopped
    environment:
      - MODE=normal
    volumes:
      - signal-data:/home/.local/share/signal-cli

volumes:
  relay-ssh:
  relay-data:
  signal-data:
