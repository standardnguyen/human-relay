services:
  human-relay:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "8090:8090"
    env_file:
      - .env
    volumes:
      - /root/.ssh/id_ed25519:/root/.ssh/id_ed25519:ro
      - relay-ssh:/root/.ssh-data
      - relay-data:/opt/human-relay/data
      - ./ssh_config:/root/.ssh/config:ro

volumes:
  relay-ssh:
  relay-data:
