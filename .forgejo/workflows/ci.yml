name: CI
on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  test:
    runs-on: docker
    container:
      image: node:20-bookworm
    steps:
      - name: Install Go
        run: |
          curl -fsSL https://go.dev/dl/go1.24.1.linux-amd64.tar.gz | tar -C /usr/local -xz
          echo "/usr/local/go/bin" >> $GITHUB_PATH

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build binary
        run: go build -o human-relay .

      - name: Run unit tests
        run: go test -v -count=1 ./mcp/ ./executor/ ./whitelist/

      - name: Run integration tests
        run: HUMAN_RELAY_BIN=${{ github.workspace }}/human-relay go test -v -count=1 ./integration/...

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - name: Deploy to CTID 131
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          echo "$DEPLOY_KEY" > /tmp/deploy_key && chmod 600 /tmp/deploy_key
          ssh -o StrictHostKeyChecking=no -i /tmp/deploy_key root@192.168.10.88 \
            '/opt/human-relay/deploy.sh'
          rm /tmp/deploy_key

  deploy-cobble:
    needs: deploy
    if: github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - name: Transfer image and deploy to CTID 2009
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          echo "$DEPLOY_KEY" > /tmp/deploy_key && chmod 600 /tmp/deploy_key
          SSH="ssh -o StrictHostKeyChecking=no -i /tmp/deploy_key"
          # Transfer freshly built image from CTID 131 to CTID 2009
          $SSH root@192.168.10.88 'docker save human-relay-human-relay:latest' | \
            $SSH root@192.168.40.13 'docker load'
          # Render the OpenProject API token from cobble-bao into the relay .env,
          # idempotently (strip any stale OPENPROJECT_ lines, then re-render). The
          # relay is the sanctioned exception to the "no secrets in .env" policy:
          # it holds service tokens by design (documented cobble-side).
          $SSH root@192.168.40.13 \
            'set -a; . /etc/openbao/cobble-relay.env; set +a; cd /opt/human-relay/hr-deploy; sed -i "/^OPENPROJECT_/d" .env; /usr/local/bin/bao-env services/openproject >> .env; chmod 600 .env'
          # Restart service with new image (--force-recreate reloads the .env)
          $SSH root@192.168.40.13 \
            'cd /opt/human-relay/hr-deploy && docker compose up -d --force-recreate --no-build && docker image prune -f'
          rm /tmp/deploy_key
