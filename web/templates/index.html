<style>

<body>

<h1>Human Relay</h1>

<div class="status-bar">
  <span class="dot" id="connDot"></span>
  <span id="connStatus">Connecting...</span>
  <span style="margin-left:auto" id="requestCount"></span>
  <button class="btn-turbo" id="turboBtn" onclick="toggleTurbo()">Turbo</button>
  <span class="turbo-info" id="turboInfo"></span>
  <button class="btn-clear" onclick="clearHistory()">Clear History</button>
</div>

<div class="filters">
  <button class="active" data-filter="">All</button>
  <button data-filter="pending">Pending</button>
  <button data-filter="running">Running</button>
  <button data-filter="complete">Complete</button>
  <button data-filter="denied">Denied</button>
  <button data-filter="withdrawn">Withdrawn</button>
  <button data-filter="error">Error</button>
  <span class="filter-divider"></span>
  <button class="filter-whitelist" data-filter="whitelist">Whitelist <span id="wlCount"></span></button>
</div>

<div id="requests" class="request-list"></div>

<script>
const TOKEN = localStorage.getItem('mhr_token') || prompt('Enter auth token:');
if (TOKEN) localStorage.setItem('mhr_token', TOKEN);

const headers = { 'Authorization': 'Bearer ' + TOKEN };
let currentFilter = '';
let requests = [];
let showAll = false;
const DISPLAY_LIMIT = 20;
let hiddenIDs = new Set();
let cooldownUntil = 0;
let cooldownDuration = 30000;
let cooldownInterval = null;
let turboActive = false;
let turboUntil = 0;
let turboInterval = null;

// Bidi control character regex: LRM, RLM, LRE, RLE, PDF, LRO, RLO, LRI, RLI, FSI, PDI
const BIDI_RE = /[\u200E\u200F\u202A-\u202E\u2066-\u2069]/g;

// Filter buttons
document.querySelectorAll('.filters button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    showAll = false;
    render();
  });
});

function formatTime(ts) {
  const d = new Date(ts);
  return d.toLocaleTimeString();
}

function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

function stripBidi(s) {
  if (!s) return s;
  return s.replace(BIDI_RE, '[BIDI]');
}

function sanitize(s) {
  return escapeHtml(stripBidi(s));
}

function hasNonAscii(s) {
  if (!s) return false;
  return /[^\x20-\x7E\n\r\t]/.test(s);
}

function requestHasNonAscii(r) {
  if (hasNonAscii(r.command)) return true;
  if (hasNonAscii(r.reason)) return true;
  if (hasNonAscii(r.working_dir)) return true;
  if (r.args && r.args.some(hasNonAscii)) return true;
  return false;
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + 'B';
  if (bytes < 1048576) return (bytes/1024).toFixed(1) + 'KB';
  return (bytes/1048576).toFixed(1) + 'MB';
}

function buildCommandDisplay(r) {
  // HTTP requests get a special display
  if (r.type === 'http') {
    return buildHTTPDisplay(r);
  }
  if (r.display_command) {
    return '<span class="cmd-token">' + escapeHtml(r.display_command) + '</span>';
  }
  if (r.shell) {
    // Shell mode: render as flat escaped string
    let full = stripBidi(r.command);
    if (r.args && r.args.length) {
      full += ' ' + r.args.map(stripBidi).join(' ');
    }
    return escapeHtml(full);
  }
  // Non-shell: highlight command token, wrap args in bordered spans
  let html = '<span class="cmd-token">' + escapeHtml(stripBidi(r.command)) + '</span>';
  if (r.args && r.args.length) {
    for (const arg of r.args) {
      html += ' <span class="arg-token">' + escapeHtml(stripBidi(arg)) + '</span>';
    }
  }
  return html;
}

function buildHTTPDisplay(r) {
  const methodColors = {
    GET: 'var(--green)', POST: 'var(--blue)', PUT: 'var(--orange)',
    PATCH: 'var(--yellow)', DELETE: 'var(--red)', HEAD: 'var(--text-muted)'
  };
  const color = methodColors[r.http_method] || 'var(--text-muted)';
  let html = '<span class="http-method-badge" style="background:' + color + '">' + escapeHtml(r.http_method) + '</span> ';
  html += '<span class="http-url">' + escapeHtml(r.http_url) + '</span>';

  // Headers
  if (r.http_headers && Object.keys(r.http_headers).length > 0) {
    html += '<div class="http-headers">';
    for (const [k, v] of Object.entries(r.http_headers)) {
      const display = /^(authorization|x-api-key|cookie)/i.test(k)
        ? escapeHtml(k) + ': <span class="http-redacted">' + escapeHtml(v.substring(0, 12)) + '...</span>'
        : escapeHtml(k) + ': ' + escapeHtml(v);
      html += '<div class="http-header-line">' + display + '</div>';
    }
    html += '</div>';
  }

  // Body
  if (r.http_body) {
    let bodyPreview = r.http_body;
    let truncated = false;
    if (bodyPreview.length > 1024) {
      bodyPreview = bodyPreview.substring(0, 1024);
      truncated = true;
    }
    // Try to pretty-print JSON
    try {
      const parsed = JSON.parse(r.http_body);
      bodyPreview = JSON.stringify(parsed, null, 2);
      if (bodyPreview.length > 1024) {
        bodyPreview = bodyPreview.substring(0, 1024);
        truncated = true;
      }
    } catch(e) {}
    html += '<div class="http-body"><div class="output-label">body</div><pre>' + escapeHtml(bodyPreview) + (truncated ? '\n...(truncated)' : '') + '</pre></div>';
  }
  return html;
}

function tryDecodeBase64(b64) {
  try {
    const binStr = atob(b64);
    const bytes = new Uint8Array(binStr.length);
    for (let i = 0; i < binStr.length; i++) bytes[i] = binStr.charCodeAt(i);
    const decoded = new TextDecoder('utf-8', { fatal: true }).decode(bytes);
    // Must be mostly printable text (allow common whitespace + unicode)
    const printable = decoded.replace(/[^\x20-\x7e\x09\x0a\x0d\u00a0-\uffff]/g, '').length;
    if (printable / decoded.length > 0.9 && decoded.length > 10) return decoded;
  } catch(e) {}
  return null;
}

function findBase64Blobs(text) {
  const blobs = [];
  const seen = new Set();

  // Approach 1: consecutive lines of pure base64 (heredoc-style)
  const lines = text.split('\n');
  let i = 0;
  while (i < lines.length) {
    const trimmed = lines[i].trim();
    if (/^[A-Za-z0-9+\/]{16,}={0,2}$/.test(trimmed)) {
      let b64 = '';
      while (i < lines.length && /^[A-Za-z0-9+\/]{4,}={0,2}$/.test(lines[i].trim())) {
        b64 += lines[i].trim();
        i++;
      }
      if (b64.length >= 20 && !seen.has(b64)) {
        const decoded = tryDecodeBase64(b64);
        if (decoded) { blobs.push({ decoded }); seen.add(b64); }
      }
    } else {
      i++;
    }
  }

  // Approach 2: inline base64 strings (embedded in other content)
  const re = /[A-Za-z0-9+\/]{20,}={0,2}/g;
  let m;
  while ((m = re.exec(text)) !== null) {
    if (!seen.has(m[0])) {
      const decoded = tryDecodeBase64(m[0]);
      if (decoded) { blobs.push({ decoded }); seen.add(m[0]); }
    }
  }
  return blobs;
}

function buildBase64Display(r) {
  const cmdText = r.command + (r.args && r.args.length ? ' ' + r.args.join(' ') : '');
  const blobs = findBase64Blobs(cmdText);
  if (blobs.length === 0) return '';

  let html = '';
  for (let j = 0; j < blobs.length; j++) {
    const id = 'b64-' + r.id + '-' + j;
    const label = 'Decoded base64' + (blobs.length > 1 ? ' #' + (j+1) : '');
    html += '<div class="b64-section">' +
      '<span class="b64-label" id="' + id + '-label" onclick="toggleB64(\'' + id + '\')">' +
      '\u25BC ' + label + '</span>' +
      '<div class="b64-decoded" id="' + id + '">' + escapeHtml(blobs[j].decoded) + '</div>' +
      '</div>';
  }
  return html;
}

function toggleB64(id) {
  const el = document.getElementById(id);
  const label = document.getElementById(id + '-label');
  if (el && label) {
    const showing = el.style.display !== 'none';
    el.style.display = showing ? 'none' : '';
    const txt = label.textContent;
    label.textContent = (showing ? '\u25B6 ' : '\u25BC ') + txt.slice(2);
  }
}

let truncateCounter = 0;

function truncateWithToggle(text, maxLen, prefix) {
  const clean = stripBidi(text);
  if (clean.length <= maxLen) {
    return escapeHtml(clean);
  }
  const id = prefix + '-' + (truncateCounter++);
  const truncated = escapeHtml(clean.slice(0, maxLen)) + '...';
  const full = escapeHtml(clean);
  return '<span id="' + id + '-short">' + truncated +
    ' <span class="toggle-link" onclick="toggleTruncate(\'' + id + '\')">show more</span></span>' +
    '<span id="' + id + '-full" style="display:none">' + full +
    ' <span class="toggle-link" onclick="toggleTruncate(\'' + id + '\')">show less</span></span>';
}

function toggleTruncate(id) {
  const short = document.getElementById(id + '-short');
  const full = document.getElementById(id + '-full');
  if (short && full) {
    const showing = short.style.display !== 'none';
    short.style.display = showing ? 'none' : '';
    full.style.display = showing ? '' : 'none';
  }
}

function render() {
  const el = document.getElementById('requests');

  if (currentFilter === 'whitelist') {
    renderWhitelistView(el);
    return;
  }

  const filtered = (currentFilter
    ? requests.filter(r => r.status === currentFilter)
    : requests
  ).filter(r => !hiddenIDs.has(r.id));

  // Sort: status-filtered views for complete/denied/error show newest first.
  // "All" view: pending oldest-first at top, non-pending newest-first after.
  // Pending/running views: oldest first.
  const newestFirstStatuses = ['complete', 'denied', 'error', 'withdrawn'];
  filtered.sort((a, b) => {
    if (currentFilter === '' || currentFilter === 'pending' || currentFilter === 'running') {
      // All/pending/running: pending items first, oldest-to-newest
      if (a.status === 'pending' && b.status !== 'pending') return -1;
      if (b.status === 'pending' && a.status !== 'pending') return 1;
      if (a.status === 'pending' && b.status === 'pending') {
        return new Date(a.created_at) - new Date(b.created_at);
      }
    }
    if (currentFilter === '' || newestFirstStatuses.includes(currentFilter)) {
      // Non-pending in "all", or complete/denied/error tabs: newest first
      return new Date(b.created_at) - new Date(a.created_at);
    }
    return new Date(a.created_at) - new Date(b.created_at);
  });

  const pending = requests.filter(r => r.status === 'pending').length;
  document.getElementById('requestCount').textContent =
    pending > 0 ? pending + ' pending' : requests.length + ' total';

  if (filtered.length === 0) {
    el.innerHTML = '<div class="empty">No requests</div>';
    return;
  }

  const totalCount = filtered.length;
  const limited = (!showAll && totalCount > DISPLAY_LIMIT)
    ? filtered.slice(0, DISPLAY_LIMIT)
    : filtered;

  truncateCounter = 0;

  let html = limited.map(r => {
    const isHTTP = r.type === 'http';
    const cmdDisplay = buildCommandDisplay(r);
    const b64Display = isHTTP ? '' : buildBase64Display(r);
    const shellBadge = (!isHTTP && r.shell) ? '<span class="shell-badge">SHELL</span>' : '';
    const fileBadge = (!isHTTP && r.stdin_len > 0) ? '<span class="file-badge">FILE ' + formatSize(r.stdin_len) + '</span>' : '';
    const nonAsciiBadge = (!isHTTP && requestHasNonAscii(r)) ? '<span class="nonascii-badge">NON-ASCII</span>' : '';
    const wdInfo = r.working_dir ? '<div class="meta">cwd: ' + sanitize(r.working_dir) + '</div>' : '';

    // Line count badge for long commands
    const cmdText = r.shell
      ? (r.command + (r.args && r.args.length ? ' ' + r.args.join(' ') : ''))
      : (r.command + (r.args && r.args.length ? ' ' + r.args.join(' ') : ''));
    const lineCount = cmdText.split('\n').length;
    const linesBadge = lineCount > 5
      ? '<span class="line-count-badge">' + lineCount + ' lines — scroll to review</span>'
      : '';

    // Shell warning for pending shell commands
    const isShellPending = r.shell && r.status === 'pending';
    const shellWarning = isShellPending
      ? '<div class="shell-warning-banner">Shell execution — command will be interpreted by sh -c. Review carefully.</div>'
      : '';
    const nonAsciiWarning = requestHasNonAscii(r) && r.status === 'pending'
      ? '<div class="nonascii-warning-banner">Non-ASCII characters detected — check for homoglyph substitution.</div>'
      : '';
    const cardClass = 'request-card ' + r.status + (isShellPending ? ' shell-warn' : '');

    // For whitelist matching, map to the same keys the backend uses
    const isScript = r.type === 'script';
    const isScriptCreate = r.type === 'script_create';
    const wlCmdKey = isHTTP ? r.http_method : isScript ? 'run_script' : isScriptCreate ? 'create_script' : r.command;
    const wlArgsKey = isHTTP ? [r.http_url] : (isScript || isScriptCreate) ? [r.script_name] : (r.args || []);
    const wlMatch = isWhitelisted(wlCmdKey, wlArgsKey);
    const wlBtnHtml = (r.status !== 'pending')
      ? (wlMatch
        ? '<button class="btn-whitelist active" disabled>Whitelisted</button>'
        : '<button class="btn-whitelist" onclick="addWhitelist(\'' + escapeHtml(wlCmdKey).replace(/'/g, "\\'") + '\',' + JSON.stringify(wlArgsKey).replace(/"/g, '&quot;') + ')">Whitelist</button>')
      : '';

    let actions = '';
    if (r.status === 'pending') {
      const inCooldown = Date.now() < cooldownUntil;
      const approveDisabled = inCooldown ? ' disabled' : '';
      const remaining = Math.max(0, cooldownUntil - Date.now());
      const pct = inCooldown && cooldownDuration > 0 ? (remaining / cooldownDuration) * 100 : 0;
      const secs = Math.ceil(remaining / 1000);
      const cooldownHtml = inCooldown
        ? '<div class="cooldown-bar"><div class="cooldown-bar-fill" style="width:' + pct + '%"></div></div>' +
          '<div class="cooldown-label">' + secs + 's cooldown</div>'
        : '';
      const wlCmd = escapeHtml(wlCmdKey).replace(/'/g, "\\'");
      const wlArgs = JSON.stringify(wlArgsKey).replace(/"/g, '&quot;');
      const approveWlBtn = '<button class="btn-approve-wl"' + approveDisabled + ' onclick="approveAndWhitelist(\'' + r.id + '\',\'' + wlCmd + '\',' + wlArgs + ')">Approve &amp; Whitelist</button>';
      actions = '<div class="actions">' +
        '<button class="btn-approve"' + approveDisabled + ' onclick="approve(\'' + r.id + '\')">Approve</button>' +
        approveWlBtn +
        '<button class="btn-deny" onclick="deny(\'' + r.id + '\')">Deny</button>' +
        '</div>' + cooldownHtml;
    } else if (r.status === 'withdrawn') {
      actions = '<div class="actions">' +
        '<button class="btn-mark-read" onclick="markRead(\'' + r.id + '\')">Mark Read</button>' +
        '</div>';
    }

    let output = '';
    if (r.result) {
      if (r.type === 'http' && r.result.status_code) {
        const sc = r.result.status_code;
        const scColor = sc >= 200 && sc < 300 ? 'var(--green)' : sc >= 400 ? 'var(--red)' : 'var(--yellow)';
        output += '<div class="output-label">response <span class="http-status-badge" style="background:' + scColor + ';color:#fff">' + sc + '</span></div>';
        if (r.result.response_headers && Object.keys(r.result.response_headers).length > 0) {
          const hdrId = 'resp-hdrs-' + r.id;
          output += '<details style="margin-bottom:0.3rem"><summary style="font-size:0.75rem;color:var(--text-muted);cursor:pointer">response headers</summary>';
          output += '<div class="http-headers">';
          for (const [k, v] of Object.entries(r.result.response_headers)) {
            output += '<div class="http-header-line">' + escapeHtml(k) + ': ' + escapeHtml(v) + '</div>';
          }
          output += '</div></details>';
        }
        if (r.result.stdout) {
          let body = r.result.stdout;
          try { body = JSON.stringify(JSON.parse(body), null, 2); } catch(e) {}
          output += '<div class="output">' + escapeHtml(body) + '</div>';
        }
        if (r.result.stderr) {
          output += '<div class="output-label">error</div>';
          output += '<div class="output">' + escapeHtml(r.result.stderr) + '</div>';
        }
      } else {
        if (r.result.stdout) {
          output += '<div class="output-label">stdout (exit ' + r.result.exit_code + ')</div>';
          output += '<div class="output">' + escapeHtml(r.result.stdout) + '</div>';
        }
        if (r.result.stderr) {
          output += '<div class="output-label">stderr</div>';
          output += '<div class="output">' + escapeHtml(r.result.stderr) + '</div>';
        }
        if (!r.result.stdout && !r.result.stderr) {
          output += '<div class="output-label">exit code: ' + r.result.exit_code + ' (no output)</div>';
        }
      }
    }
    if (r.deny_reason) {
      output += '<div class="deny-reason">Denied: ' + sanitize(r.deny_reason) + '</div>';
    }
    if (r.withdraw_reason) {
      output += '<div class="withdraw-reason">Withdrawn by agent: ' + sanitize(r.withdraw_reason) + '</div>';
    }

    return `<div class="${cardClass}">
      <div class="request-header">
        <span class="request-id">${r.id}</span>
        <span class="request-status ${r.status}">${r.status}</span>
      </div>
      ${shellWarning}
      ${nonAsciiWarning}
      <div class="command-block">${cmdDisplay}${shellBadge}${fileBadge}${nonAsciiBadge}${linesBadge}</div>
      ${b64Display}
      <div class="reason">${truncateWithToggle(r.reason, 200, 'reason-' + r.id)}</div>
      ${wdInfo}
      <div class="meta">${formatTime(r.created_at)}</div>
      ${actions}
      ${output}
      ${wlBtnHtml ? '<div style="margin-top:0.5rem">' + wlBtnHtml + '</div>' : ''}
    </div>`;
  }).join('');

  if (!showAll && totalCount > DISPLAY_LIMIT) {
    html += '<div class="empty" style="cursor:pointer" onclick="showAll=true;render()">' +
      'Showing ' + DISPLAY_LIMIT + ' of ' + totalCount + ' — click to show all</div>';
  } else if (showAll && totalCount > DISPLAY_LIMIT) {
    html += '<div class="empty" style="cursor:pointer" onclick="showAll=false;render()">' +
      'Showing all ' + totalCount + ' — click to collapse</div>';
  }

  el.innerHTML = html;
}

// Whitelist management
let whitelistRules = [];

async function fetchWhitelist() {
  try {
    const resp = await fetch('/api/whitelist', { headers });
    if (resp.ok) {
      whitelistRules = await resp.json();
      updateWhitelistCount();
      if (currentFilter === 'whitelist') render();
    }
  } catch(e) { console.error('whitelist fetch:', e); }
}

function isWhitelisted(command, args) {
  return whitelistRules.some(r =>
    r.command === command &&
    JSON.stringify(r.args || []) === JSON.stringify(args || [])
  );
}

function updateWhitelistCount() {
  const countEl = document.getElementById('wlCount');
  countEl.textContent = whitelistRules.length > 0 ? '(' + whitelistRules.length + ')' : '';
}

function renderWhitelistView(el) {
  // Update count badge and pending count in status bar
  const pending = requests.filter(r => r.status === 'pending').length;
  document.getElementById('requestCount').textContent =
    pending > 0 ? pending + ' pending' : requests.length + ' total';

  if (whitelistRules.length === 0) {
    el.innerHTML = '<div class="empty">No whitelisted commands.<br>Use the "Whitelist" button on a completed request to auto-approve it next time.</div>';
    return;
  }
  el.innerHTML = whitelistRules.map((r, i) => {
    const cmd = escapeHtml(r.command);
    const args = (r.args || []).map(a => '<span class="arg-token">' + escapeHtml(a) + '</span>').join(' ');
    return '<div class="wl-rule"><span class="wl-cmd"><span class="cmd-token">' + cmd + '</span> ' + args + '</span>' +
      '<button class="btn-wl-remove" onclick="removeWhitelist(' + i + ')">Remove</button></div>';
  }).join('');
}

async function addWhitelist(command, args) {
  const argsStr = (args || []).length ? ' ' + (args || []).join(' ') : '';
  if (!confirm('Whitelist this command for auto-approval?\n\n' + command + argsStr)) return;
  const resp = await fetch('/api/whitelist', {
    method: 'POST',
    headers: { ...headers, 'Content-Type': 'application/json' },
    body: JSON.stringify({ command, args: args || [] })
  });
  if (resp.ok) {
    await fetchWhitelist();
    render();
  }
}

async function removeWhitelist(index) {
  const rule = whitelistRules[index];
  if (!rule) return;
  if (!confirm('Remove this whitelist rule?')) return;
  await fetch('/api/whitelist/remove', {
    method: 'POST',
    headers: { ...headers, 'Content-Type': 'application/json' },
    body: JSON.stringify({ command: rule.command, args: rule.args || [] })
  });
  fetchWhitelist();
}

async function fetchRequests() {
  try {
    const resp = await fetch('/api/requests', { headers });
    if (resp.ok) {
      requests = await resp.json();
      const cdMs = parseInt(resp.headers.get('X-Cooldown-Remaining-Ms') || '0', 10);
      const cdDur = parseInt(resp.headers.get('X-Cooldown-Duration-Ms') || '0', 10);
      if (cdDur > 0) cooldownDuration = cdDur;
      if (cdMs > 0) {
        cooldownUntil = Date.now() + cdMs;
        startCooldownTimer();
      } else {
        cooldownUntil = 0;
      }
      // Sync turbo state from headers
      const wasTurbo = turboActive;
      turboActive = resp.headers.get('X-Turbo-Active') === 'true';
      if (turboActive) {
        const turboMs = parseInt(resp.headers.get('X-Turbo-Remaining-Ms') || '0', 10);
        turboUntil = Date.now() + turboMs;
        startTurboTimer();
      } else {
        turboUntil = 0;
      }
      updateTurboUI();
      render();
    }
  } catch (e) {
    console.error('fetch error:', e);
  }
}

async function approve(id) {
  await fetch('/api/requests/' + id + '/approve', {
    method: 'POST',
    headers
  });
  // Re-fetch syncs cooldown state from server header
  fetchRequests();
}

async function approveAndWhitelist(id, command, args) {
  await fetch('/api/requests/' + id + '/approve', {
    method: 'POST',
    headers
  });
  await fetch('/api/whitelist', {
    method: 'POST',
    headers: { ...headers, 'Content-Type': 'application/json' },
    body: JSON.stringify({ command, args: args || [] })
  });
  await fetchWhitelist();
  fetchRequests();
}

function startCooldownTimer() {
  if (cooldownInterval) clearInterval(cooldownInterval);
  render();
  cooldownInterval = setInterval(() => {
    if (Date.now() >= cooldownUntil) {
      clearInterval(cooldownInterval);
      cooldownInterval = null;
      cooldownUntil = 0;
      render();
    } else {
      updateCooldownDisplay();
    }
  }, 100);
}

function updateCooldownDisplay() {
  const remaining = cooldownUntil - Date.now();
  if (remaining <= 0) return;
  const pct = cooldownDuration > 0 ? (remaining / cooldownDuration) * 100 : 0;
  const secs = Math.ceil(remaining / 1000);
  document.querySelectorAll('.cooldown-bar-fill').forEach(el => {
    el.style.width = pct + '%';
  });
  document.querySelectorAll('.cooldown-label').forEach(el => {
    el.textContent = secs + 's cooldown';
  });
}

async function deny(id) {
  const reason = prompt('Deny reason (optional):');
  if (reason === null) return;
  await fetch('/api/requests/' + id + '/deny', {
    method: 'POST',
    headers,
    body: JSON.stringify({ reason })
  });
  fetchRequests();
}

async function toggleTurbo() {
  if (turboActive) {
    await fetch('/api/turbocharge', { method: 'DELETE', headers });
  } else {
    await fetch('/api/turbocharge', {
      method: 'POST',
      headers: { ...headers, 'Content-Type': 'application/json' },
      body: JSON.stringify({ duration_minutes: 5, cooldown_seconds: 10 })
    });
  }
  fetchRequests();
}

function clearHistory() {
  const terminal = requests.filter(r =>
    r.status === 'complete' || r.status === 'denied' || r.status === 'error' || r.status === 'timeout' || r.status === 'withdrawn'
  );
  if (terminal.length === 0) return;
  terminal.forEach(r => hiddenIDs.add(r.id));
  showAll = false;
  render();
}

function markRead(id) {
  hiddenIDs.add(id);
  render();
}

function startTurboTimer() {
  if (turboInterval) clearInterval(turboInterval);
  turboInterval = setInterval(() => {
    if (Date.now() >= turboUntil) {
      clearInterval(turboInterval);
      turboInterval = null;
      turboActive = false;
      turboUntil = 0;
      updateTurboUI();
      fetchRequests();
    } else {
      updateTurboUI();
    }
  }, 1000);
}

function updateTurboUI() {
  const btn = document.getElementById('turboBtn');
  const info = document.getElementById('turboInfo');
  if (turboActive) {
    btn.classList.add('active');
    btn.textContent = 'Turbo ON';
    const remaining = Math.max(0, turboUntil - Date.now());
    const mins = Math.floor(remaining / 60000);
    const secs = Math.ceil((remaining % 60000) / 1000);
    info.textContent = mins + ':' + String(secs).padStart(2, '0');
  } else {
    btn.classList.remove('active');
    btn.textContent = 'Turbo';
    info.textContent = '';
  }
}

// SSE for real-time updates
function connectSSE() {
  const dot = document.getElementById('connDot');
  const status = document.getElementById('connStatus');

  const es = new EventSource('/events');

  es.onopen = () => {
    dot.classList.remove('disconnected');
    status.textContent = 'Connected';
  };
  es.onmessage = (e) => {
    fetchRequests();
    fetchWhitelist();
  };
  es.onerror = () => {
    dot.classList.add('disconnected');
    status.textContent = 'Disconnected — retrying...';
  };
}

// Request notification permission
if ('Notification' in window && Notification.permission === 'default') {
  Notification.requestPermission();
}

function notifyNewRequest(r) {
  if ('Notification' in window && Notification.permission === 'granted') {
    const title = r.type === 'http'
      ? stripBidi(r.http_method + ' ' + r.http_url)
      : stripBidi(r.command);
    let body = stripBidi(title + ' — ' + r.reason);
    if (body.length > 100) body = body.slice(0, 100) + '...';
    new Notification('Human Relay', {
      body: body,
      tag: r.id
    });
  }
}

// Watch for new pending requests
let prevPending = new Set();
const origRender = render;
render = function() {
  const newPending = new Set(requests.filter(r => r.status === 'pending').map(r => r.id));
  for (const id of newPending) {
    if (!prevPending.has(id)) {
      const r = requests.find(req => req.id === id);
      if (r) notifyNewRequest(r);
    }
  }
  prevPending = newPending;
  origRender();
};

fetchRequests();
fetchWhitelist();
connectSSE();
</script>
