name: CI
on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: docker
    container:
      image: node:20-bookworm
    steps:
      - name: Install Go
        run: |
          curl -fsSL https://go.dev/dl/go1.23.6.linux-amd64.tar.gz | tar -C /usr/local -xz
          echo "/usr/local/go/bin" >> $GITHUB_PATH

      - name: Checkout human-relay
        uses: actions/checkout@v4

      - name: Checkout tests
        uses: actions/checkout@v4
        with:
          repository: administrator/human-relay-tests
          ref: main
          token: ${{ secrets.FORGEJO_TOKEN }}
          path: _tests

      - name: Build binary
        run: go build -o human-relay .

      - name: Run integration tests
        run: |
          cd _tests
          HUMAN_RELAY_BIN=$(pwd)/../human-relay go test -v -count=1 ./...

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - name: Deploy to CTID 131
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          echo "$DEPLOY_KEY" > /tmp/deploy_key && chmod 600 /tmp/deploy_key
          ssh -o StrictHostKeyChecking=no -i /tmp/deploy_key root@192.168.10.88 \
            '/opt/human-relay/deploy.sh'
          rm /tmp/deploy_key
