<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Human Relay</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
    --blue: #58a6ff;
    --orange: #f0883e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 1rem;
  }
  h1 { font-size: 1.5rem; margin-bottom: 1rem; }
  .status-bar {
    display: flex;
    gap: 1rem;
    margin-bottom: 1rem;
    padding: 0.5rem 1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 0.85rem;
    color: var(--text-muted);
    align-items: center;
  }
  .status-bar .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    display: inline-block;
  }
  .status-bar .dot.disconnected { background: var(--red); }
  .filters {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }
  .filters button {
    padding: 0.3rem 0.8rem;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: var(--surface);
    color: var(--text-muted);
    cursor: pointer;
    font-size: 0.85rem;
  }
  .filters button.active {
    background: var(--blue);
    color: #fff;
    border-color: var(--blue);
  }
  .request-list { display: flex; flex-direction: column; gap: 0.75rem; }
  .request-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1rem;
  }
  .request-card.pending { border-left: 3px solid var(--yellow); }
  .request-card.approved, .request-card.running { border-left: 3px solid var(--blue); }
  .request-card.complete { border-left: 3px solid var(--green); }
  .request-card.denied { border-left: 3px solid var(--red); }
  .request-card.error { border-left: 3px solid var(--orange); }
  .request-card.shell-warn {
    border-color: var(--red);
    background: rgba(248,81,73,0.05);
  }
  .request-card.shell-warn.pending { border-left: 3px solid var(--red); }
  .shell-warning-banner {
    background: rgba(248,81,73,0.15);
    border: 1px solid rgba(248,81,73,0.3);
    border-radius: 4px;
    padding: 0.4rem 0.6rem;
    font-size: 0.8rem;
    color: var(--red);
    margin-bottom: 0.5rem;
    font-weight: 600;
  }
  .request-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.5rem;
  }
  .request-id { font-family: monospace; color: var(--text-muted); font-size: 0.8rem; }
  .request-status {
    font-size: 0.75rem;
    padding: 0.2rem 0.5rem;
    border-radius: 12px;
    text-transform: uppercase;
    font-weight: 600;
  }
  .request-status.pending { background: rgba(210,153,34,0.2); color: var(--yellow); }
  .request-status.approved, .request-status.running { background: rgba(88,166,255,0.2); color: var(--blue); }
  .request-status.complete { background: rgba(63,185,80,0.2); color: var(--green); }
  .request-status.denied { background: rgba(248,81,73,0.2); color: var(--red); }
  .request-status.error { background: rgba(240,136,62,0.2); color: var(--orange); }
  .command-block {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.75rem;
    font-family: monospace;
    font-size: 0.9rem;
    margin-bottom: 0.5rem;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 200px;
    overflow-y: auto;
    direction: ltr;
    unicode-bidi: isolate;
  }
  .cmd-token {
    color: var(--green);
    font-weight: 600;
  }
  .arg-token {
    display: inline;
    border: 1px solid var(--border);
    background: rgba(110,118,129,0.1);
    border-radius: 3px;
    padding: 0 0.2rem;
    margin: 0 0.15rem;
  }
  .line-count-badge {
    display: inline-block;
    font-size: 0.7rem;
    padding: 0.1rem 0.4rem;
    border-radius: 4px;
    background: rgba(88,166,255,0.2);
    color: var(--blue);
    margin-left: 0.5rem;
    font-weight: 600;
  }
  .shell-badge {
    display: inline-block;
    font-size: 0.7rem;
    padding: 0.1rem 0.4rem;
    border-radius: 4px;
    background: rgba(248,81,73,0.2);
    color: var(--red);
    margin-left: 0.5rem;
    font-weight: 600;
  }
  .reason { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 0.75rem; }
  .reason .toggle-link {
    color: var(--blue);
    cursor: pointer;
    font-size: 0.8rem;
    margin-left: 0.3rem;
  }
  .meta { color: var(--text-muted); font-size: 0.75rem; margin-bottom: 0.5rem; }
  .actions { display: flex; gap: 0.5rem; }
  .actions button {
    padding: 0.4rem 1.2rem;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 600;
  }
  .btn-approve { background: var(--green); color: #fff; }
  .btn-deny { background: var(--red); color: #fff; }
  .btn-approve:hover { opacity: 0.9; }
  .btn-deny:hover { opacity: 0.9; }
  .output {
    margin-top: 0.75rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.75rem;
    font-family: monospace;
    font-size: 0.8rem;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 300px;
    overflow-y: auto;
  }
  .output-label { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.5rem; }
  .deny-reason { color: var(--red); font-size: 0.85rem; margin-top: 0.5rem; }
  .empty {
    text-align: center;
    color: var(--text-muted);
    padding: 3rem;
    font-size: 0.9rem;
  }
</style>
</head>
<body>

<h1>Human Relay</h1>

<div class="status-bar">
  <span class="dot" id="connDot"></span>
  <span id="connStatus">Connecting...</span>
  <span style="margin-left:auto" id="requestCount"></span>
</div>

<div class="filters">
  <button class="active" data-filter="">All</button>
  <button data-filter="pending">Pending</button>
  <button data-filter="running">Running</button>
  <button data-filter="complete">Complete</button>
  <button data-filter="denied">Denied</button>
  <button data-filter="error">Error</button>
</div>

<div id="requests" class="request-list"></div>

<script>
const TOKEN = localStorage.getItem('mhr_token') || prompt('Enter auth token:');
if (TOKEN) localStorage.setItem('mhr_token', TOKEN);

const headers = { 'Authorization': 'Bearer ' + TOKEN };
let currentFilter = '';
let requests = [];

// Bidi control character regex: LRM, RLM, LRE, RLE, PDF, LRO, RLO, LRI, RLI, FSI, PDI
const BIDI_RE = /[\u200E\u200F\u202A-\u202E\u2066-\u2069]/g;

// Filter buttons
document.querySelectorAll('.filters button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});

function formatTime(ts) {
  const d = new Date(ts);
  return d.toLocaleTimeString();
}

function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

function stripBidi(s) {
  if (!s) return s;
  return s.replace(BIDI_RE, '[BIDI]');
}

function sanitize(s) {
  return escapeHtml(stripBidi(s));
}

function buildCommandDisplay(r) {
  if (r.shell) {
    // Shell mode: render as flat escaped string
    let full = stripBidi(r.command);
    if (r.args && r.args.length) {
      full += ' ' + r.args.map(stripBidi).join(' ');
    }
    return escapeHtml(full);
  }
  // Non-shell: highlight command token, wrap args in bordered spans
  let html = '<span class="cmd-token">' + escapeHtml(stripBidi(r.command)) + '</span>';
  if (r.args && r.args.length) {
    for (const arg of r.args) {
      html += ' <span class="arg-token">' + escapeHtml(stripBidi(arg)) + '</span>';
    }
  }
  return html;
}

let truncateCounter = 0;

function truncateWithToggle(text, maxLen, prefix) {
  const clean = stripBidi(text);
  if (clean.length <= maxLen) {
    return escapeHtml(clean);
  }
  const id = prefix + '-' + (truncateCounter++);
  const truncated = escapeHtml(clean.slice(0, maxLen)) + '...';
  const full = escapeHtml(clean);
  return '<span id="' + id + '-short">' + truncated +
    ' <span class="toggle-link" onclick="toggleTruncate(\'' + id + '\')">show more</span></span>' +
    '<span id="' + id + '-full" style="display:none">' + full +
    ' <span class="toggle-link" onclick="toggleTruncate(\'' + id + '\')">show less</span></span>';
}

function toggleTruncate(id) {
  const short = document.getElementById(id + '-short');
  const full = document.getElementById(id + '-full');
  if (short && full) {
    const showing = short.style.display !== 'none';
    short.style.display = showing ? 'none' : '';
    full.style.display = showing ? '' : 'none';
  }
}

function render() {
  const el = document.getElementById('requests');
  const filtered = currentFilter
    ? requests.filter(r => r.status === currentFilter)
    : requests;

  // Sort: pending first, then by time descending
  filtered.sort((a, b) => {
    if (a.status === 'pending' && b.status !== 'pending') return -1;
    if (b.status === 'pending' && a.status !== 'pending') return 1;
    return new Date(b.created_at) - new Date(a.created_at);
  });

  const pending = requests.filter(r => r.status === 'pending').length;
  document.getElementById('requestCount').textContent =
    pending > 0 ? pending + ' pending' : requests.length + ' total';

  if (filtered.length === 0) {
    el.innerHTML = '<div class="empty">No requests</div>';
    return;
  }

  truncateCounter = 0;

  el.innerHTML = filtered.map(r => {
    const cmdDisplay = buildCommandDisplay(r);
    const shellBadge = r.shell ? '<span class="shell-badge">SHELL</span>' : '';
    const wdInfo = r.working_dir ? '<div class="meta">cwd: ' + sanitize(r.working_dir) + '</div>' : '';

    // Line count badge for long commands
    const cmdText = r.shell
      ? (r.command + (r.args && r.args.length ? ' ' + r.args.join(' ') : ''))
      : (r.command + (r.args && r.args.length ? ' ' + r.args.join(' ') : ''));
    const lineCount = cmdText.split('\n').length;
    const linesBadge = lineCount > 5
      ? '<span class="line-count-badge">' + lineCount + ' lines — scroll to review</span>'
      : '';

    // Shell warning for pending shell commands
    const isShellPending = r.shell && r.status === 'pending';
    const shellWarning = isShellPending
      ? '<div class="shell-warning-banner">Shell execution — command will be interpreted by sh -c. Review carefully.</div>'
      : '';
    const cardClass = 'request-card ' + r.status + (isShellPending ? ' shell-warn' : '');

    let actions = '';
    if (r.status === 'pending') {
      actions = `<div class="actions">
        <button class="btn-approve" onclick="approve('${r.id}')">Approve</button>
        <button class="btn-deny" onclick="deny('${r.id}')">Deny</button>
      </div>`;
    }

    let output = '';
    if (r.result) {
      if (r.result.stdout) {
        output += '<div class="output-label">stdout (exit ' + r.result.exit_code + ')</div>';
        output += '<div class="output">' + escapeHtml(r.result.stdout) + '</div>';
      }
      if (r.result.stderr) {
        output += '<div class="output-label">stderr</div>';
        output += '<div class="output">' + escapeHtml(r.result.stderr) + '</div>';
      }
      if (!r.result.stdout && !r.result.stderr) {
        output += '<div class="output-label">exit code: ' + r.result.exit_code + ' (no output)</div>';
      }
    }
    if (r.deny_reason) {
      output += '<div class="deny-reason">Denied: ' + sanitize(r.deny_reason) + '</div>';
    }

    return `<div class="${cardClass}">
      <div class="request-header">
        <span class="request-id">${r.id}</span>
        <span class="request-status ${r.status}">${r.status}</span>
      </div>
      ${shellWarning}
      <div class="command-block">${cmdDisplay}${shellBadge}${linesBadge}</div>
      <div class="reason">${truncateWithToggle(r.reason, 200, 'reason-' + r.id)}</div>
      ${wdInfo}
      <div class="meta">${formatTime(r.created_at)}</div>
      ${actions}
      ${output}
    </div>`;
  }).join('');
}

async function fetchRequests() {
  try {
    const resp = await fetch('/api/requests', { headers });
    if (resp.ok) {
      requests = await resp.json();
      render();
    }
  } catch (e) {
    console.error('fetch error:', e);
  }
}

async function approve(id) {
  await fetch('/api/requests/' + id + '/approve', {
    method: 'POST',
    headers
  });
  fetchRequests();
}

async function deny(id) {
  const reason = prompt('Deny reason (optional):') || '';
  await fetch('/api/requests/' + id + '/deny', {
    method: 'POST',
    headers,
    body: JSON.stringify({ reason })
  });
  fetchRequests();
}

// SSE for real-time updates
function connectSSE() {
  const dot = document.getElementById('connDot');
  const status = document.getElementById('connStatus');

  const es = new EventSource('/events');

  es.onopen = () => {
    dot.classList.remove('disconnected');
    status.textContent = 'Connected';
  };
  es.onmessage = (e) => {
    fetchRequests();
  };
  es.onerror = () => {
    dot.classList.add('disconnected');
    status.textContent = 'Disconnected — retrying...';
  };
}

// Request notification permission
if ('Notification' in window && Notification.permission === 'default') {
  Notification.requestPermission();
}

function notifyNewRequest(r) {
  if ('Notification' in window && Notification.permission === 'granted') {
    let body = stripBidi(r.command + ' — ' + r.reason);
    if (body.length > 100) body = body.slice(0, 100) + '...';
    new Notification('Human Relay', {
      body: body,
      tag: r.id
    });
  }
}

// Watch for new pending requests
let prevPending = new Set();
const origRender = render;
render = function() {
  const newPending = new Set(requests.filter(r => r.status === 'pending').map(r => r.id));
  for (const id of newPending) {
    if (!prevPending.has(id)) {
      const r = requests.find(req => req.id === id);
      if (r) notifyNewRequest(r);
    }
  }
  prevPending = newPending;
  origRender();
};

fetchRequests();
connectSSE();
</script>

</body>
</html>
